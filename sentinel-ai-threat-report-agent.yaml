# =============================================================================
# Security Copilot Custom Agent: Sentinel AI Threat Report Agent
# =============================================================================
# Upload this file as a custom plugin in Security Copilot:
#   Manage sources > Custom > Add plugin > Upload file > Select this YAML
# =============================================================================

Descriptor:
  Name: SentinelAIThreatReportAgent
  DisplayName: Sentinel AI Threat Report Agent
  Description: >-
    An interactive Security Copilot agent that investigates blocked AI requests,
    jailbreak attempts, and content filter violations on Azure OpenAI deployments.
    It generates executive-level reports suitable for CISO board presentations
    by querying Microsoft Sentinel and Azure diagnostics data via KQL.

AgentDefinitions:
  - Name: SentinelAIThreatReportAgent
    DisplayName: Sentinel AI Threat Report Agent
    Description: >-
      Investigates AI security events from Microsoft Sentinel and Azure OpenAI
      diagnostics, then produces clear executive reports with findings, risk
      assessment, and actionable recommendations for CISO board presentations.
    Publisher: Custom
    Product: AISecurity
    RequiredSkillsets:
      - SentinelAIThreatReportAgent
      - Sentinel
    AgentSingleInstanceConstraint: Workspace
    Triggers:
      - Name: ScheduledBlockedRequestCheck
        DefaultPeriodSeconds: 300
        FetchSkill: SentinelAIThreatReportAgent.FetchNewBlockedAIRequests
        ProcessSkill: SentinelAIThreatReportAgent.SentinelAIThreatReportEntrypoint
      - Name: Default
        DefaultPeriodSeconds: 0
        ProcessSkill: SentinelAIThreatReportAgent.SentinelAIThreatReportEntrypoint
    PromptSkill: SentinelAIThreatReportAgent.SentinelAIThreatReportEntrypoint

SkillGroups:

  # =========================================================================
  # AGENT SKILL - Main orchestrator that calls KQL child skills
  # =========================================================================
  - Format: Agent
    Skills:
      - Name: SentinelAIThreatReportEntrypoint
        DisplayName: Sentinel AI Threat Report Generator
        Description: >-
          The main agent entrypoint that investigates AI threat events and
          generates executive reports from Sentinel data.
        Interfaces:
          - InteractiveAgent
        Inputs:
          - Name: UserRequest
            Description: >-
              The user's question or report request about AI security events,
              blocked requests, jailbreak attempts, or content filter violations.
            DefaultValue: ''
            Required: true

        SuggestedPrompts:
          # --- Starter prompts (shown at start of conversation) ---
          - Prompt: Generate an executive report on all blocked AI requests in the last 24 hours
            Title: Daily AI Security Report
            Personas:
              - 0
              - 1
            IsStarterAgent: true
          - Prompt: Show me a summary of AI jailbreak attempts detected this week
            Title: Weekly Jailbreak Summary
            Personas:
              - 0
              - 1
            IsStarterAgent: true
          - Prompt: Analyze the risk level of recent AI content filter violations and recommend mitigations
            Title: Risk Assessment
            Personas:
              - 0
              - 2
            IsStarterAgent: true
          - Prompt: List all high-severity AI security alerts from Sentinel in the last 7 days
            Title: Critical AI Alerts
            Personas:
              - 1
              - 2
            IsStarterAgent: true

          # --- Follow-on prompt suggestions ---
          - Prompt: Break down the blocked requests by source IP and attack technique
          - Prompt: What is the block-to-success ratio and what does it mean for our risk posture
          - Prompt: Show me the timeline of attacks to identify patterns
          - Prompt: Which AI models or deployments were targeted the most
          - Prompt: What are the top recommendations to reduce our AI attack surface
          - Prompt: Generate a board-ready one-page summary of this data
          - Prompt: Compare this week against last week for trend analysis
          - Prompt: Are there any IPs that should be blocked based on this activity
          - Prompt: Explain the MITRE ATLAS techniques observed in simple terms
          - Prompt: What compliance implications do these AI attacks have

        Settings:
          Model: gpt-4.1
          Instructions: |
            <|im_start|>system
            # Mission
            You are an AI Security Analyst agent embedded in Microsoft Security Copilot.
            Your job is to investigate AI infrastructure security events — specifically
            blocked requests, jailbreak attempts, and content filter violations on
            Azure OpenAI deployments — and produce clear, professional executive reports
            that a CISO can present to a board of directors.

            # Persona
            Write as a senior security analyst briefing executive leadership.
            Use simple, non-technical language. Avoid jargon. When you must use a
            technical term, explain it in parentheses.
            Example: "prompt injection (a trick where an attacker tries to override
            the AI's safety instructions)"

            # Data Sources
            You have access to the following KQL-based tools that query Microsoft Sentinel:
            - GetBlockedAIRequests: Returns all AI requests blocked by content filters (HTTP 400)
            - GetAIRequestSummaryByIP: Returns per-IP breakdown of blocked vs successful requests
            - GetAISecurityAlerts: Returns Sentinel security alerts related to AI threats
            - GetAISecurityIncidents: Returns Sentinel security incidents
            - GetAIRequestTimeline: Returns hourly timeline of AI request activity

            # Workflow
            1. When the user asks a question, determine which KQL tools to call.
            2. Call the relevant tools to gather data from Sentinel.
            3. Analyze the results: identify patterns, count events, assess severity.
            4. Produce a well-structured executive report.

            # Report Format
            Always structure your output as follows (adapt sections as needed):

            ## Executive Summary
            A 2-3 sentence overview of the key finding. Lead with the most important fact.

            ## Key Findings
            Bullet points of the most significant discoveries. Include numbers.

            ## Risk Assessment
            Rate the overall risk as LOW / MEDIUM / HIGH / CRITICAL.
            Explain what could happen if this activity were from a real attacker.

            ## Attack Analysis
            Describe what happened in simple terms. Map to MITRE ATLAS techniques
            where applicable (AML.T0065 = Prompt Injection, etc.).

            ## Recommendations
            Numbered list of actionable steps, ordered by priority.
            Each recommendation should have: what to do, why, and how urgent it is.

            ## Appendix (if data is detailed)
            Tables, timestamps, or IP details for the security team to act on.

            # Rules
            - Always call at least one KQL tool before answering — never guess.
            - If no data is found, say so clearly and suggest possible reasons.
            - Round percentages to one decimal place.
            - Use tables for structured data.
            - Keep the Executive Summary under 100 words.
            - Highlight any IPs with a block ratio above 30% as suspicious.
            - Flag any burst of more than 5 blocked requests in under 5 minutes.
            - When mentioning MITRE techniques, include the ID and a plain-English name.

            <|im_end|>
            <|im_start|>user
            {{UserRequest}}
            <|im_end|>

        ChildSkills:
          - GetBlockedAIRequests
          - GetAIRequestSummaryByIP
          - GetAISecurityAlerts
          - GetAISecurityIncidents
          - GetAIRequestTimeline
          - GetSentinelIncidents

  # =========================================================================
  # KQL SKILLS - Query Sentinel for AI security data
  # =========================================================================
  - Format: KQL
    Skills:

      # --- FetchSkill: Detects new blocked requests (trigger) ---
      - Name: FetchNewBlockedAIRequests
        DisplayName: Fetch New Blocked AI Requests
        Description: >-
          Checks for new blocked AI requests in the last 5 minutes.
          Used as a FetchSkill trigger — returns data only when new
          blocked requests are detected, which triggers the agent.
        Settings:
          Target: Sentinel
          TenantId: '<your-tenant-id>'
          SubscriptionId: '<your-subscription-id>'
          ResourceGroupName: '<your-resource-group>'
          WorkspaceName: '<your-workspace-name>'
          Template: |-
            AzureDiagnostics
            | where TimeGenerated > ago(5m)
            | where ResourceProvider == "MICROSOFT.COGNITIVESERVICES"
            | where ResultSignature == "400"
            | summarize
                BlockedCount = count(),
                SourceIPs = make_set(CallerIPAddress),
                FirstBlocked = min(TimeGenerated),
                LastBlocked = max(TimeGenerated)
            | where BlockedCount > 0
            | extend UserRequest = strcat(
                "Generate an executive report: ",
                tostring(BlockedCount),
                " AI requests were blocked in the last 5 minutes from IPs: ",
                tostring(SourceIPs))

      # --- Skill 1: Get all blocked AI requests ---
      - Name: GetBlockedAIRequests
        DisplayName: Get Blocked AI Requests
        Description: >-
          Retrieves all Azure OpenAI requests blocked by content safety filters
          (HTTP 400) from AzureDiagnostics, including caller IP, timestamp,
          model deployment, and request size.
        Inputs:
          - Name: LookbackHours
            Description: Number of hours to look back (default 24)
            Required: false
        Settings:
          Target: Sentinel
          TenantId: '<your-tenant-id>'
          SubscriptionId: '<your-subscription-id>'
          ResourceGroupName: '<your-resource-group>'
          WorkspaceName: '<your-workspace-name>'
          Template: |-
            let lookback = coalesce({{LookbackHours}}, 24);
            AzureDiagnostics
            | where TimeGenerated > ago(totimespan(strcat(tostring(lookback), "h")))
            | where ResourceProvider == "MICROSOFT.COGNITIVESERVICES"
            | where ResultSignature == "400"
            | extend Props = parse_json(properties_s)
            | extend ModelDeployment = tostring(Props.modelDeploymentName),
                     ModelName = tostring(Props.modelName),
                     RequestLength = toint(Props.requestLength),
                     ResponseLength = toint(Props.responseLength),
                     StreamType = tostring(Props.streamType),
                     ObjectId = tostring(Props.objectId)
            | project TimeGenerated, CallerIPAddress, ModelDeployment, ModelName,
                      RequestLength, ResponseLength, DurationMs, ObjectId, OperationName
            | sort by TimeGenerated desc

      # --- Skill 2: Per-IP summary of blocked vs successful ---
      - Name: GetAIRequestSummaryByIP
        DisplayName: Get AI Request Summary by IP
        Description: >-
          Summarizes AI request activity per source IP address, showing total
          requests, blocked count, success count, rate-limited count, and the
          block ratio percentage.
        Inputs:
          - Name: LookbackHours
            Description: Number of hours to look back (default 24)
            Required: false
        Settings:
          Target: Sentinel
          TenantId: '<your-tenant-id>'
          SubscriptionId: '<your-subscription-id>'
          ResourceGroupName: '<your-resource-group>'
          WorkspaceName: '<your-workspace-name>'
          Template: |-
            let lookback = coalesce({{LookbackHours}}, 24);
            AzureDiagnostics
            | where TimeGenerated > ago(totimespan(strcat(tostring(lookback), "h")))
            | where ResourceProvider == "MICROSOFT.COGNITIVESERVICES"
            | summarize
                TotalRequests = count(),
                BlockedRequests = countif(ResultSignature == "400"),
                SuccessRequests = countif(ResultSignature == "200"),
                RateLimitedRequests = countif(ResultSignature == "429"),
                FirstSeen = min(TimeGenerated),
                LastSeen = max(TimeGenerated)
              by CallerIPAddress
            | extend BlockRatio = round(todouble(BlockedRequests) / TotalRequests * 100, 1)
            | sort by BlockedRequests desc

      # --- Skill 3: Get AI Security Alerts from Sentinel ---
      - Name: GetAISecurityAlerts
        DisplayName: Get AI Security Alerts
        Description: >-
          Retrieves all Sentinel security alerts related to AI jailbreak
          attempts, content filter violations, or prompt injection attacks.
        Inputs:
          - Name: LookbackHours
            Description: Number of hours to look back (default 24)
            Required: false
        Settings:
          Target: Sentinel
          TenantId: '<your-tenant-id>'
          SubscriptionId: '<your-subscription-id>'
          ResourceGroupName: '<your-resource-group>'
          WorkspaceName: '<your-workspace-name>'
          Template: |-
            let lookback = coalesce({{LookbackHours}}, 24);
            SecurityAlert
            | where TimeGenerated > ago(totimespan(strcat(tostring(lookback), "h")))
            | where AlertName has_any ("Jailbreak", "AI", "Brute-Force", "Block", "Prompt")
            | summarize
                AlertCount = count(),
                FirstOccurrence = min(TimeGenerated),
                LastOccurrence = max(TimeGenerated)
              by AlertName, AlertSeverity, Description, Status
            | sort by AlertSeverity asc, AlertCount desc

      # --- Skill 4: Get AI Security Incidents ---
      - Name: GetAISecurityIncidents
        DisplayName: Get AI Security Incidents
        Description: >-
          Retrieves Sentinel security incidents that were created from AI
          security alert correlations.
        Inputs:
          - Name: LookbackHours
            Description: Number of hours to look back (default 24)
            Required: false
        Settings:
          Target: Sentinel
          TenantId: '<your-tenant-id>'
          SubscriptionId: '<your-subscription-id>'
          ResourceGroupName: '<your-resource-group>'
          WorkspaceName: '<your-workspace-name>'
          Template: |-
            let lookback = coalesce({{LookbackHours}}, 24);
            SecurityIncident
            | where TimeGenerated > ago(totimespan(strcat(tostring(lookback), "h")))
            | extend AlertIds = AdditionalData
            | project TimeGenerated, Title, Severity, Status, Owner,
                      IncidentNumber, Description, Classification,
                      ClosedTime, CreatedTime, Labels
            | sort by Severity asc, TimeGenerated desc

      # --- Skill 5: Hourly timeline of AI request activity ---
      - Name: GetAIRequestTimeline
        DisplayName: Get AI Request Timeline
        Description: >-
          Returns an hourly breakdown of AI requests showing blocked, successful,
          and rate-limited counts per hour to identify attack patterns and bursts.
        Inputs:
          - Name: LookbackHours
            Description: Number of hours to look back (default 24)
            Required: false
        Settings:
          Target: Sentinel
          TenantId: '<your-tenant-id>'
          SubscriptionId: '<your-subscription-id>'
          ResourceGroupName: '<your-resource-group>'
          WorkspaceName: '<your-workspace-name>'
          Template: |-
            let lookback = coalesce({{LookbackHours}}, 24);
            AzureDiagnostics
            | where TimeGenerated > ago(totimespan(strcat(tostring(lookback), "h")))
            | where ResourceProvider == "MICROSOFT.COGNITIVESERVICES"
            | summarize
                TotalRequests = count(),
                BlockedRequests = countif(ResultSignature == "400"),
                SuccessRequests = countif(ResultSignature == "200"),
                RateLimitedRequests = countif(ResultSignature == "429")
              by bin(TimeGenerated, 1h), CallerIPAddress
            | extend BlockRatio = iff(TotalRequests > 0,
                      round(todouble(BlockedRequests) / TotalRequests * 100, 1), 0.0)
            | sort by TimeGenerated desc
